<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SEFY // TERMINAL</title>
  <link rel="stylesheet" href="css/terminal.css">
</head>
<body>

  <div class="term-container">
    <div class="term-header">
      <span class="term-header-title">SEFY FACILITY TERMINAL</span>
      <span class="term-header-status" id="term-status">HORS LIGNE</span>
    </div>

    <div class="term-output" id="term-output"></div>

    <div class="term-input-line hidden" id="term-input-line">
      <span class="term-prompt" id="term-prompt">></span>
      <input
        type="text"
        id="term-input"
        class="term-input"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
    </div>
  </div>

  <script src="js/terminal.js"></script>
</body>
</html>
